<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioExplorer: Biomes & Succession</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-module { display: none; }
        .active-module { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-green-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">BioExplorer</h1>
            <div class="space-x-4">
                <button onclick="showModule('intro')" class="hover:underline">Terms</button>
                <button onclick="showModule('biomes')" class="hover:underline">Biomes</button>
                <button onclick="showModule('succession')" class="hover:underline">Succession</button>
                <button onclick="showModule('species')" class="hover:underline">Species</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        
        <section id="intro" class="active-module space-y-6">
            <h2 class="text-3xl font-bold text-green-800">Module 1: Foundations</h2>
            <p>Click a card to learn the definition.</p>
            <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div onclick="alert('Habitat: The physical place where an organism lives.')" class="bg-white p-6 rounded-xl shadow cursor-pointer hover:bg-green-100 transition border-b-4 border-green-500 text-center">
                    <h3 class="font-bold text-xl">Habitat</h3>
                </div>
                </div>
        </section>

        <section id="biomes" class="hidden-module space-y-6">
            <h2 class="text-3xl font-bold text-blue-800">Module 2: The 6 Great Biomes</h2>
            <div class="overflow-x-auto">
                <table class="w-full bg-white rounded-lg shadow">
                    <thead class="bg-blue-600 text-white">
                        <tr>
                            <th class="p-3 text-left">Biome</th>
                            <th class="p-3 text-left">Climate</th>
                            <th class="p-3 text-left">Life</th>
                        </tr>
                    </thead>
                    <tbody id="biome-table-body">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        function showModule(moduleId) {
            // Hide all sections
            document.querySelectorAll('section').forEach(sec => {
                sec.classList.replace('active-module', 'hidden-module');
            });
            // Show the selected one
            document.getElementById(moduleId).classList.replace('hidden-module', 'active-module');
        }
    </script>
</body>
</html>
